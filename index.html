<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Laperle — Mini App</title>
<style>
:root{
  --accent:#39FF14;
  --accent-dim:#2ecc0f;
  --bg:#0a0a0a;
  --bg-card:#111a11;
  --bg-elevated:#131313;
  --border:#1c2a1c;
  --border-soft:#1a1a1a;
  --text:#f2f2f2;
  --text-dim:#8a938a;
  --text-faint:#5c655c;
  --danger:#ff4d4d;
  --radius:16px;
  --radius-sm:10px;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
html,body{height:100%; overscroll-behavior:none; overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
button, input, textarea, select{font-family:inherit; -webkit-appearance:none; appearance:none;}
input, textarea, select{font-size:16px;} /* iOS Safari zooms the page on focus if a field is under 16px — keep every field at/above this */
button{cursor:pointer;}
button:active{opacity:0.72;}
a{color:inherit; text-decoration:none;}
/* prevent iOS auto-zoom on focus: inputs must be >=16px, already enforced per-field below */

#app{
  width:100%;
  max-width:520px;
  height:100vh;
  height:calc(var(--vh, 1vh) * 100);
  height:100dvh;
  height:var(--tg-viewport-stable-height, var(--vh-fallback, 100dvh)); /* Telegram WebView: real usable height */
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
@media (min-width:521px){
  #app{
    max-width:430px;
    height:100vh;
    height:100dvh;
    max-height:932px;
    margin:12px 0;
    border-radius:36px;
    box-shadow:0 0 0 1px #222, 0 30px 80px rgba(0,0,0,0.6);
  }
}

/* device safe-area spacer (replaces fake iOS status bar; real device chrome shows above this automatically) */
.safe-top{flex-shrink:0; height:env(safe-area-inset-top,0px);}

/* #views must grow to fill remaining space AND allow its child to shrink below content size —
   without min-height:0 here, flexbox lets .view's content push #app taller than the screen,
   which kills the inner scroll and makes the whole thing feel broken/backwards on touch. */
#views{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ---------- top bar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 10px;
  flex-shrink:0;
}
.topbar .btn-pill{
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,0.08);
  border:none; color:#fff; font-size:14px; font-weight:600;
  padding:10px 16px; border-radius:20px;
  min-height:40px;
}
.topbar .right-icons{display:flex; gap:8px;}
.topbar .icon-btn{
  width:38px; height:38px; border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex; align-items:center; justify-content:center;
  color:#fff;
}
.topbar.with-title{padding-top:2px;}
.topbar .title-block{display:flex; align-items:center; gap:10px;}
.topbar .title-block .logo-badge{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(145deg,var(--accent),#0d5c05);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
}
.topbar .title-block h1{font-size:17px; font-weight:700;}
.topbar .title-block .sub{font-size:11px; color:var(--text-dim); font-weight:500;}
.back-btn{display:flex; align-items:center; gap:4px; background:none; border:none; color:#fff; font-size:15px; font-weight:500; min-height:40px; padding:4px 6px 4px 0;}

/* ---------- views ---------- */
.view{
  flex:1 1 auto; min-height:0;
  overflow-y:auto; overflow-x:hidden;
  padding-bottom:20px;
  display:none;
  -ms-overflow-style:none; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.view::-webkit-scrollbar{display:none;}
.view.active{display:block;}

/* ---------- bottom nav ----------
   Deliberately NOT position:fixed/absolute. Telegram's in-app browser has known bugs
   computing "the real bottom of the screen" for fixed-positioned elements, which is
   exactly why the bar was invisible/cut off on real phones. Instead the nav is just a
   normal flex child that sits right after the scrollable content — it can never end up
   anywhere but visible, because it isn't positioned relative to the viewport at all. */
.bottomnav{
  flex-shrink:0;
  width:100%;
  background:var(--navbar-bg, rgba(8,10,8,0.98));
  border-top:1px solid var(--border-soft);
  display:flex; align-items:center; justify-content:space-around;
  padding:8px 2px calc(10px + env(safe-area-inset-bottom,0px));
}
.navitem{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-faint);
  font-size:9px; font-weight:600; letter-spacing:0.2px;
  position:relative; flex:1; min-width:0;
  min-height:44px; justify-content:center;
  padding:4px 0;
}
.navitem svg{width:21px; height:21px; flex-shrink:0;}
.navitem span{max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.navitem.active{color:var(--navbar-accent, var(--accent));}
.navitem.pill{color:#000;}
.navitem.pill .icon-wrap{
  width:27px;height:27px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  color:#000;
}
.navitem.pill .icon-wrap svg{width:15px;height:15px;}
.navitem.pill.admin .icon-wrap{background:var(--accent);}
.navitem .badge{
  position:absolute; top:0px; right:14%;
  background:#ff9500; color:#000; font-size:8px; font-weight:800;
  width:14px;height:14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.navitem .badge svg{width:8px;height:8px;}

/* ---------- shared components ---------- */
.section-label{
  font-size:11px; font-weight:700; letter-spacing:1.5px; color:var(--text-faint);
  text-transform:uppercase; padding:18px 18px 8px;
}
.empty-state{
  margin:14px 18px; padding:40px 20px;
  border:1px dashed var(--border);
  border-radius:var(--radius);
  display:flex; flex-direction:column; align-items:center; gap:14px;
  text-align:center;
}
.empty-state .icon-circle{
  width:52px;height:52px;border-radius:50%;
  background:var(--bg-card); border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}
.empty-state p{font-size:13.5px; color:var(--text-dim); max-width:240px; line-height:1.5;}
.empty-state .title{font-size:14px; font-weight:600; color:#fff;}

.btn-primary{
  width:100%; background:linear-gradient(180deg,#4dff20,var(--accent-dim));
  color:#04240a; border:none; font-weight:800; font-size:14.5px;
  padding:15px; border-radius:14px; display:flex; align-items:center; justify-content:center; gap:8px;
  letter-spacing:0.3px;
}
.btn-outline{
  width:100%; background:transparent; border:1px solid var(--border);
  color:#fff; font-weight:600; font-size:14px; padding:14px; border-radius:14px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.pill-tag{
  font-size:11px; font-weight:700; color:var(--accent); background:rgba(57,255,20,0.1);
  border:1px solid rgba(57,255,20,0.35); padding:3px 10px; border-radius:20px;
}

/* ---------- HOME / HERO ---------- */
.hero{
  margin:6px 14px 0; padding:34px 18px 26px;
  border-radius:20px;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(57,255,20,0.16), transparent 60%),
    #070907;
  border:1px solid var(--border);
  position:relative; text-align:center; overflow:hidden;
}
.hero .corner{position:absolute; width:22px; height:22px; border-color:var(--accent); opacity:0.8;}
.hero .corner.tl{top:12px; left:12px; border-top:2px solid; border-left:2px solid; border-radius:4px 0 0 0;}
.hero .corner.tr{top:12px; right:12px; border-top:2px solid; border-right:2px solid; border-radius:0 4px 0 0;}
.hero .corner.bl{bottom:60px; left:12px; border-bottom:2px solid; border-left:2px solid; border-radius:0 0 0 4px;}
.hero .corner.br{bottom:60px; right:12px; border-bottom:2px solid; border-right:2px solid; border-radius:0 0 4px 0;}
.hero .live-row{display:flex; align-items:center; justify-content:space-between; font-size:11px; font-weight:700; letter-spacing:1px; color:var(--text-dim); margin-bottom:26px;}
.hero .live-row .dot{color:var(--accent); display:flex; align-items:center; gap:6px;}
.hero .live-row .dot::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); display:inline-block;}
.hero .eyebrow{font-size:11px; font-weight:700; letter-spacing:3px; color:var(--accent); margin-bottom:10px;}
.hero .eyebrow::before, .hero .eyebrow::after{content:'—'; margin:0 8px; opacity:0.6;}
.hero h1{
  font-family:'Arial Black',Impact,sans-serif; font-size:40px; font-weight:900;
  letter-spacing:1px; color:#eef1ee; line-height:1;
  text-shadow:0 0 22px rgba(57,255,20,0.35);
  margin-bottom:12px;
}
.hero .sub{font-size:12px; letter-spacing:3px; color:var(--text-dim); font-weight:600; margin-bottom:20px;}
.hero .explore-btn{
  display:inline-flex; align-items:center; gap:12px;
  background:var(--accent); color:#04240a; font-weight:800; font-size:14px; letter-spacing:1px;
  padding:13px 8px 13px 22px; border-radius:30px; border:none;
}
.hero .explore-btn .arrowcircle{
  width:26px;height:26px;border-radius:50%; background:rgba(0,0,0,0.18);
  display:flex;align-items:center;justify-content:center;
}
.hero .scroll-cue{margin-top:22px; font-size:9px; letter-spacing:2px; color:var(--text-faint); font-weight:700; display:flex; flex-direction:column; align-items:center; gap:3px;}

.shop-banner{
  margin:16px 14px 0; padding:16px 4px 14px;
  border-bottom:1px solid var(--border-soft);
}
.shop-banner .row{display:flex; align-items:center; gap:12px;}
.shop-banner .avatar{
  width:42px;height:42px;border-radius:50%; border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center; font-weight:800; color:var(--accent); font-size:16px;
  box-shadow:0 0 14px rgba(57,255,20,0.35);
}
.shop-banner .meta{flex:1;}
.shop-banner .status{font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--accent); display:flex; align-items:center; gap:5px; margin-bottom:2px;}
.shop-banner .status::before{content:''; width:5px;height:5px;border-radius:50%;background:var(--accent);}
.shop-banner h2{font-size:22px; font-weight:800;}
.shop-banner .count{
  display:inline-block; margin-top:10px; font-size:12px; font-weight:700; color:var(--accent);
  border:1px solid rgba(57,255,20,0.4); background:rgba(57,255,20,0.07); padding:4px 14px; border-radius:20px;
}

.filter-row{display:flex; gap:10px; margin:14px 14px 0;}
.filter-pill{
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  border:1px solid var(--border); border-radius:12px; padding:12px; font-size:13.5px; font-weight:600; color:#dfe4df;
  background:rgba(255,255,255,0.02);
}
.filter-pill.active{border-color:var(--accent); color:var(--accent); background:rgba(57,255,20,0.07);}
.rot180{transform:rotate(180deg);}

/* ---------- filter sheet (catégories / farms) ---------- */
.filter-sheet-overlay{
  position:absolute; inset:0; z-index:50;
  background:rgba(0,0,0,0.6);
  display:flex; align-items:flex-end;
}
.filter-sheet{
  width:100%; max-height:70%; overflow-y:auto;
  background:var(--bg-elevated); border:1px solid var(--border-soft);
  border-radius:20px 20px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom,0px));
}
.filter-sheet-handle{width:36px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 14px;}
.filter-sheet-title{font-size:15px; font-weight:700; color:#fff; margin-bottom:12px;}
.filter-sheet-item{
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 4px; font-size:14px; font-weight:600; color:#dfe4df;
  border-bottom:1px solid var(--border-soft);
}
.filter-sheet-item:last-child{border-bottom:none;}
.filter-sheet-item.selected{color:var(--accent);}
.filter-sheet-empty{padding:24px 4px; text-align:center; color:var(--text-dim); font-size:13.5px;}

/* ---------- INFOS ---------- */
.info-card{
  background:var(--bg-card); border:1px solid var(--border-soft); border-radius:14px;
  padding:14px; margin-bottom:12px;
}
.info-row{display:flex; align-items:center; justify-content:space-between;}
.info-left{display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; color:#eee;}
.info-left svg{width:18px;height:18px; color:var(--accent);}
.meetup-item{display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:13.5px;}
.meetup-item svg{width:16px;height:16px;color:var(--text-dim);}

/* ---------- CARTE ---------- */
.carrier-row::-webkit-scrollbar{display:none;}
.carrier-chip{
  flex-shrink:0; font-size:12px; font-weight:700; border:1px solid; padding:7px 14px; border-radius:20px; background:rgba(255,255,255,0.02);
  white-space:nowrap;
}
.map-wrap{position:relative; margin:0 0 0; height:58vh; min-height:380px;}
.map-fake{
  position:absolute; inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03), transparent 40%),
    #0d0f0d;
  border-top:1px solid var(--border-soft);
  overflow:hidden;
}
.map-fake::before{
  content:''; position:absolute; inset:0; opacity:0.35;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:32px 32px;
}
.map-pin{
  position:absolute; transform:translate(-50%,-50%);
  width:34px;height:34px;border-radius:50%; border:2px solid;
  display:flex;align-items:center;justify-content:center; font-size:12px; font-weight:800;
}
.map-pin.drop{background:none;border:none; color:#ff4d4d; width:26px;height:26px;}
.map-pin.drop svg{width:26px;height:26px; fill:#ff4d4d; color:#ff4d4d;}
.map-controls{position:absolute; right:14px; bottom:20px; display:flex; flex-direction:column; gap:8px;}
.map-ctrl-btn{
  width:36px;height:36px;border-radius:10px; background:rgba(20,22,20,0.9); border:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:center; color:#fff;
}
.map-ctrl-btn svg{width:17px;height:17px;}

/* ---------- AVIS ---------- */
.rating-card{
  margin:6px 16px 0; background:var(--bg-card); border:1px solid var(--border-soft); border-radius:16px;
  padding:18px; display:flex; gap:20px; align-items:center;
}
.rating-big{text-align:center; min-width:80px;}
.rating-big .score{font-size:38px; font-weight:800;}
.rating-big .stars{display:flex; gap:2px; color:var(--text-faint); justify-content:center; margin:2px 0;}
.rating-big .stars svg{width:14px;height:14px;}
.rating-bars{flex:1; display:flex; flex-direction:column; gap:6px;}
.rbar-row{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-dim);}
.rbar-row svg{width:10px;height:10px; color:var(--text-faint);}
.rbar-row span:first-child{width:34px; display:flex; align-items:center; gap:3px;}
.rbar{flex:1; height:5px; background:var(--border-soft); border-radius:4px; overflow:hidden;}
.rbar-fill{height:100%; background:var(--accent);}
.rbar-n{width:14px; text-align:right;}

/* ---------- CHAT ---------- */
.chat-input-bar{
  position:absolute; bottom:88px; left:0; right:0; padding:0 16px;
  display:flex; gap:10px; align-items:center;
}
.chat-input-bar input{
  flex:1; background:var(--bg-card); border:1px solid var(--border-soft); border-radius:24px;
  padding:14px 18px; color:#fff; font-size:16px;
}
.chat-input-bar input::placeholder{color:var(--text-faint);}
.send-btn{
  width:44px;height:44px;border-radius:50%; background:var(--accent); border:none;
  display:flex;align-items:center;justify-content:center; color:#04240a; flex-shrink:0;
}
.send-btn svg{width:18px;height:18px;}

/* ---------- PROFIL ---------- */
.profile-avatar{
  width:76px;height:76px;border-radius:50%; border:2.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center; font-size:28px; font-weight:800; color:var(--accent);
  box-shadow:0 0 26px rgba(57,255,20,0.4);
}
.stat-box{
  flex:1; background:var(--bg-card); border:1px solid var(--border-soft); border-radius:14px;
  padding:14px; text-align:center;
}
.stat-box .v{font-size:18px; font-weight:800;}
.stat-box .l{font-size:10.5px; color:var(--text-dim); margin-top:2px;}
.lang-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:4px 16px 6px;}
.lang-pill{
  border:1px solid var(--border); background:var(--bg-card); color:#ddd; font-size:12px; font-weight:600;
  padding:10px 4px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:5px;
}
.lang-pill.on{border-color:var(--accent); background:rgba(57,255,20,0.08); color:var(--accent);}

/* ---------- ADMIN ---------- */
.admin-head{padding:6px 18px 10px; display:flex; align-items:center; justify-content:space-between;}
.admin-head .l{display:flex; align-items:center; gap:10px;}
.admin-head .l svg{width:22px;height:22px; color:var(--accent);}
.admin-head h1{font-size:19px; font-weight:800;}
.admin-head .sub{font-size:11px; color:var(--text-dim);}
.admin-tabs{display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{
  flex-shrink:0; display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700;
  padding:9px 14px; border-radius:10px; border:1px solid var(--border-soft); color:var(--text-dim); background:var(--bg-elevated);
  white-space:nowrap;
}
.admin-tab.on{background:var(--accent); color:#04240a; border-color:var(--accent);}
.admin-tab svg{width:15px;height:15px;}

.offer-banner{
  margin:0 16px 14px; padding:14px 16px; border-radius:14px;
  background:linear-gradient(135deg, rgba(57,255,20,0.1), rgba(57,255,20,0.02));
  border:1px solid rgba(57,255,20,0.25);
}
.offer-banner .t{font-size:14px; font-weight:800; margin-bottom:2px;}
.offer-banner .d{font-size:11.5px; color:var(--text-dim); margin-bottom:10px;}
.offer-banner .tiers{display:flex; gap:8px; margin-bottom:12px;}
.offer-banner .tier{font-size:11px; font-weight:700; padding:4px 10px; border-radius:14px; border:1px solid var(--border);}
.offer-banner .tier.on{background:var(--accent); color:#04240a; border-color:var(--accent);}
.offer-banner .prog-label{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:6px;}
.offer-banner .prog{height:5px; background:var(--border-soft); border-radius:4px; overflow:hidden;}
.offer-banner .prog-fill{height:100%; width:0%; background:var(--accent);}

.grp-label{font-size:10.5px; font-weight:800; letter-spacing:1.5px; color:var(--text-faint); padding:14px 16px 8px;}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:0 16px;}
.admin-card{
  position:relative; background:var(--bg-card); border:1px solid var(--border-soft); border-radius:14px;
  padding:16px 8px 12px; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
}
.admin-card svg{width:20px;height:20px; color:#ddd;}
.admin-card span{font-size:12px; font-weight:600;}
.admin-card .vtag{position:absolute; top:8px; right:8px; font-size:8.5px; font-weight:800; color:var(--accent); background:rgba(57,255,20,0.1); border:1px solid rgba(57,255,20,0.3); padding:1px 5px; border-radius:6px;}

.field-block{margin:0 16px 16px;}
.field-block label{
  display:flex; align-items:center; gap:6px;
  font-size:10.5px; font-weight:800; letter-spacing:1px; color:var(--text-faint); margin-bottom:8px; text-transform:uppercase;
}
.field-block input, .field-block textarea, .field-block select{
  width:100%; background:var(--bg-card); border:1px solid var(--border-soft); border-radius:12px;
  padding:13px 14px; color:#fff; font-size:16px; font-family:inherit;
}
.field-block textarea{min-height:80px; resize:vertical;}
.field-block input::placeholder, .field-block textarea::placeholder{color:var(--text-faint);}

   customers, but someone with real technical skill could still reach the API directly.

const ADMIN_TELEGRAM_IDS = ['8311625659'];
function getTgUser(){
  return window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;

function computeIsAdmin(){
  const tgUser = getTgUser();

let MY_VISITOR_STATUS = 'approved'; // default: non-Telegram / dev context is never gated
let MY_VISITOR_CREATED_AT = null;
async function getApproxLocation(){
  try{
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 3500);
    const res = await fetch('https://ipapi.co/json/', {signal: ctrl.signal});
    clearTimeout(timeout);
    const data = await res.json();
    return {city: data.city||'', country: data.country_name||''};
  }catch(e){ return {city:'', country:''}; }
}
async function registerAndCheckVisitor(){
  const tgUser = getTgUser();
  if(!tgUser || IS_ADMIN){ MY_VISITOR_STATUS='approved'; return; } // no Telegram identity, or it's the shop owner -> never gate
  const tid = String(tgUser.id);
  try{
    const {data:existing} = await sb.from('miniapp_visitors').select('status, created_at').eq('telegram_id', tid).single();
    if(existing){ MY_VISITOR_STATUS = existing.status; MY_VISITOR_CREATED_AT = existing.created_at; return; }
  }catch(e){ /* no row yet -> fall through to insert */ }
  const loc = await getApproxLocation();
  try{
    const {data:inserted} = await sb.from('miniapp_visitors').insert({
      telegram_id: tid, first_name: tgUser.first_name||'', last_name: tgUser.last_name||'',
      username: tgUser.username||'', language_code: tgUser.language_code||'', is_premium: !!tgUser.is_premium,
      photo_url: tgUser.photo_url||'', device_hint: DEVICE_HINT, status:'pending',
      user_agent: navigator.userAgent||'', platform: navigator.platform||'',
      allows_write_to_pm: tgUser.allows_write_to_pm===undefined ? null : !!tgUser.allows_write_to_pm,
      approx_city: loc.city, approx_country: loc.country,
    }).select('created_at').single();
    MY_VISITOR_STATUS = 'pending';
    MY_VISITOR_CREATED_AT = inserted ? inserted.created_at : new Date().toISOString();
  }catch(e){ logSbError('registerVisitor', e); MY_VISITOR_STATUS='approved'; } // fail open rather than lock out everyone if the table has an issue
}
let visitorPollTimer=null;
function startVisitorStatusPolling(){
  clearInterval(visitorPollTimer);
  const tgUser = getTgUser();
  if(!tgUser) return;
  const tid = String(tgUser.id);
  visitorPollTimer = setInterval(async ()=>{
    try{
      const {data} = await sb.from('miniapp_visitors').select('status').eq('telegram_id', tid).single();
      if(data && data.status!==MY_VISITOR_STATUS){
        MY_VISITOR_STATUS = data.status;
      }
      renderVerificationGateIfNeeded(); // also re-checks elapsed time, to reveal the contact button after 1h
    }catch(e){}
  }, 4000);
}

function renderVerificationGateIfNeeded(){
  const existing = document.getElementById('verifGate');
  if(MY_VISITOR_STATUS==='pending' || MY_VISITOR_STATUS==='rejected'){

  } else {

let PRODUCTS = [];
function logSbError(context, e){
  const msg = (e && (e.message || e.error_description || e.hint || e.details)) || String(e);
  console.error('['+context+']', msg, e && e.code ? '(code: '+e.code+')' : '');
  return msg;
}
async function withRetry(fn, attempts){
  attempts = attempts||3;
  let lastErr;
  for(let i=0;i<attempts;i++){
    try{ return await fn(); }
    catch(e){ lastErr=e; if(i<attempts-1) await new Promise(r=>setTimeout(r, 500*(i+1))); }
  }
  throw lastErr;
}

async function loadProducts(){
  try{
    const {data, error} = await withRetry(()=>sb.from('miniapp_products').select('*').order('created_at', {ascending:true}));
    if(error) throw error;
    PRODUCTS = (data||[]).map(row=>({
      id: row.id, name: row.name, description: row.description||'', category: row.category||'', farm: row.farm||'',
      promoEnabled: row.promo_enabled, prices: row.prices||[], media: row.media||[],
      bestSeller: !!row.best_seller, mostProfitable: !!row.most_profitable,
    }));
  }catch(e){ logSbError('loadProducts', e); PRODUCTS = []; }
}
async function upsertProductRemote(product){
  try{
    const {error} = await sb.from('miniapp_products').upsert({
      id: product.id, name: product.name, description: product.description, category: product.category, farm: product.farm,
      promo_enabled: product.promoEnabled, prices: product.prices, media: product.media,
      best_seller: !!product.bestSeller, most_profitable: !!product.mostProfitable, updated_at: new Date().toISOString(),
    });
    if(error) throw error;
    return true;
  }catch(e){ logSbError('saveProduct', e); return false; }
}
async function deleteProductRemote(id){
  try{ const {error} = await sb.from('miniapp_products').delete().eq('id', id); if(error) throw error; return true; }
  catch(e){ logSbError('deleteProduct', e); return false; }
}

let SETTINGS = {};
let lastSettingsLoadFailed = false;
async function loadSettings(){
  let stored = {};
  lastSettingsLoadFailed = false;
  try{
    const {data, error} = await withRetry(()=>sb.from('miniapp_settings').select('data').eq('id',1).single());
    if(error) throw error;
    stored = data && data.data ? data.data : {};
  }catch(e){ logSbError('loadSettings', e); lastSettingsLoadFailed = true; }
  SETTINGS = Object.assign({}, DEFAULT_SETTINGS, stored);
}
async function persistSettings(){
  try{
    const {error} = await sb.from('miniapp_settings').upsert({id:1, data:SETTINGS, updated_at:new Date().toISOString()});
    if(error) throw error;
    return true;
  }catch(e){ console.error('persistSettings failed', e); return false; }
}
function shadeColor(hex, percent){
  try{
    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,Math.min(255,Math.round(r+(percent/100)*255)));
    g=Math.max(0,Math.min(255,Math.round(g+(percent/100)*255)));
    b=Math.max(0,Math.min(255,Math.round(b+(percent/100)*255)));
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }catch(e){ return hex; }
}
let loadedFonts={};
function ensureFontLoaded(font){
  if(font==='Inter' || loadedFonts[font]) return;
  const link=document.createElement('link');
  link.rel='stylesheet';
  link.href='https://fonts.googleapis.com/css2?family='+font.replace(/ /g,'+')+':wght@400;600;700;800&display=swap';
  document.head.appendChild(link);
  loadedFonts[font]=true;
}
function applySettings(){
  const root=document.documentElement.style;
  root.setProperty('--accent', SETTINGS.themeColor);
  root.setProperty('--accent-dim', shadeColor(SETTINGS.themeColor,-18));
  root.setProperty('--navbar-accent', SETTINGS.navbarColor);
  root.setProperty('--bg-card', SETTINGS.cardBg || '#111a11');
  root.setProperty('--navbar-bg', SETTINGS.navbarBg || 'rgba(8,10,8,0.98)');
  ensureFontLoaded(SETTINGS.font);
  document.body.style.fontFamily = `'${SETTINGS.font}', 'Inter', -apple-system, sans-serif`;
  document.title = SETTINGS.bandeauName || 'Mini App';
  const app=document.getElementById('app');
  if(app) app.style.backgroundImage = SETTINGS.bgImage ? `url(${SETTINGS.bgImage})` : '';
  if(app) app.style.backgroundSize='cover';
  if(app) app.style.backgroundPosition='center';
  if(typeof refreshMusicPlayer==='function') refreshMusicPlayer();
}
async function setSetting(key, value, opts){
  SETTINGS[key]=value;
  applySettings();
  if(!(opts && opts.silent)) go(currentView);
  const ok = await persistSettings();
  if(!ok){ showStorageFullError(); return; }
  if(opts && opts.toast) toast(opts.toast);
}
function toggleSetting(key, toastMsg){
  setSetting(key, !SETTINGS[key], {toast:toastMsg});
}
let toastTimer=null;
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){
    el=document.createElement('div');
    el.id='toast';
    el.className='toast-el';
    document.getElementById('app').appendChild(el);
  }
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'), 1800);
}

/* ---------- filtres Catégories / Farms (page d'accueil) ---------- */
let activeCategoryFilter = null;
let activeFarmFilter = null;
let filterSheetOpen = null; // 'category' | 'farm' | null

function openFilterSheet(type){
  filterSheetOpen = type;
  go('home');
}

function closeFilterSheet(){
  filterSheetOpen = null;
  go('home');
}

function selectFilter(type, value){
  if(type==='category') activeCategoryFilter = value || null;
  else activeFarmFilter = value || null;
  filterSheetOpen = null;
  go('home');
}

function renderFilterSheet(){
  const isCategory = filterSheetOpen === 'category';
  // Catégories : on utilise la liste gérée dans le panneau admin (onglet Catégories),
  // pas seulement celles qui ont déjà un produit — sinon une catégorie fraîchement créée
  // sans produit n'apparaîtrait jamais dans ce filtre.
  const values = isCategory
    ? (SETTINGS.categories || [])
    : [...new Set(PRODUCTS.map(p => p.farm).filter(Boolean))];
  const current = isCategory ? activeCategoryFilter : activeFarmFilter;
  const title = isCategory ? t('categories') : t('farms');

  return `
  <div class="filter-sheet-overlay" onclick="if(event.target===this) closeFilterSheet()">
    <div class="filter-sheet">
      <div class="filter-sheet-handle"></div>
      <div class="filter-sheet-title">${title}</div>
      ${values.length===0 ? `
      <div class="filter-sheet-empty">Aucune ${isCategory?'catégorie':'ferme'} disponible pour le moment.</div>
      ` : `
      <div class="filter-sheet-item ${!current?'selected':''}" onclick="selectFilter('${filterSheetOpen}', '')">
        <span>Tout afficher</span>${!current?ic('check'):''}
      </div>
      ${values.map(v => `
      <div class="filter-sheet-item ${current===v?'selected':''}" onclick="selectFilter('${filterSheetOpen}', '${v.replace(/'/g,"\\'")}')">
        <span>${v}</span>${current===v?ic('check'):''}
      </div>`).join('')}
      `}
    </div>
  </div>`;
}

let particleTimer=null;
function startParticles(){
  clearInterval(particleTimer);
  const layer=document.getElementById('particleLayer');
  if(!layer) return;
  layer.innerHTML='';
  const emojis=[];
  if(SETTINGS.animLeaves) emojis.push('🍂');
  if(SETTINGS.animHeli) emojis.push('🚁');
  if(SETTINGS.animMoney) emojis.push('💵');
  if(!emojis.length) return;
  particleTimer=setInterval(()=>{
    if(!document.getElementById('particleLayer')){ clearInterval(particleTimer); return; }
    const p=document.createElement('span');

let leafletMap=null, markerCluster=null, overpassAbort=null;
function initLeafletMap(){
  const el=document.getElementById('leafletMap');
  if(!el || typeof L==='undefined') return;
  if(leafletMap){ leafletMap.remove(); leafletMap=null; }
  leafletMap = L.map(el, {zoomControl:false, attributionControl:false}).setView([48.8566, 2.3522], 12); // start already zoomed on a real city (Paris) so pins are visible immediately
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains:'abcd', maxZoom:19,
  }).addTo(leafletMap);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  L.control.attribution({position:'bottomleft', prefix:'© OpenStreetMap · CARTO'}).addTo(leafletMap);
  markerCluster = L.markerClusterGroup({
    iconCreateFunction: cluster=>{
      const c=CARRIERS[activeCarrier].color;
      return L.divIcon({
        html:`<div style="width:36px;height:36px;border-radius:50%;background:${c}33;border:2px solid ${c};color:${c};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;">${cluster.getChildCount()}</div>`,
        className:'', iconSize:[36,36],
      });
    }
  });
  leafletMap.addLayer(markerCluster);
  leafletMap.on('moveend', fetchLockersInView);
  // if the visitor allows it, recenter on their real position (still a real, zoomed-in city view either way)
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{ leafletMap.setView([pos.coords.latitude, pos.coords.longitude], 13); },
      ()=>{ setTimeout(()=>{ leafletMap.invalidateSize(); fetchLockersInView(); }, 150); },
      {timeout:2500}
    );
  }
  setTimeout(()=>{ leafletMap.invalidateSize(); fetchLockersInView(); }, 150);
}

async function fetchLockersInView(){
  if(!leafletMap) return;
  const zoom = leafletMap.getZoom();
  const loadingEl=document.getElementById('mapLoading');
  if(zoom < 8){
    if(loadingEl) loadingEl.style.display='none';
    markerCluster.clearLayers();
    const label=document.getElementById('pointsCountLabel');
    if(label) label.innerHTML='<span style="width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;"></span>Zoomez pour voir les points';
    return;
  }
  const b=leafletMap.getBounds();
  const bbox=[b.getSouth(),b.getWest(),b.getNorth(),b.getEast()].join(',');
  if(overpassAbort) overpassAbort.abort();
  overpassAbort = new AbortController();
  if(loadingEl) loadingEl.style.display='block';
  const query = `[out:json][timeout:20];(
    node["amenity"="parcel_locker"](${bbox});
    node["shop"="parcel_locker"](${bbox});
    node["parcel_pickup"="yes"](${bbox});
    node["vending"="parcel_pickup"](${bbox});
    node["brand"~"Mondial Relay|InPost|Colissimo|Chronopost|Pickup",i](${bbox});
    node["operator"~"Mondial Relay|InPost|Colissimo|Chronopost|Pickup",i](${bbox});
  );out body;`;
  try{
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method:'POST', body:'data='+encodeURIComponent(query), signal:overpassAbort.signal,
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
    });
    const json = await res.json();
    const matchWords = CARRIERS[activeCarrier].match;
    const filtered = (json.elements||[]).filter(el=>{
      const hay = ((el.tags&&el.tags.brand)||(el.tags&&el.tags.operator)||(el.tags&&el.tags.name)||'').toLowerCase();
      return matchWords.some(w=>hay.includes(w));
    });
    markerCluster.clearLayers();
    filtered.forEach(el=>{
      const info = lockerPopupHtml(el.tags||{});
      const marker = L.marker([el.lat, el.lon], {
        icon: L.divIcon({
          html:`<div style="width:26px;height:26px;border-radius:50%;background:${CARRIERS[activeCarrier].color}33;border:2px solid ${CARRIERS[activeCarrier].color};"></div>`,
          className:'', iconSize:[26,26],
        })
      });
      marker.on('click', ()=>showLockerSheet(info));
      markerCluster.addLayer(marker);
    });
    const label=document.getElementById('pointsCountLabel');
    if(label){
      label.innerHTML = filtered.length
        ? `<span style="width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;"></span>${filtered.length} point${filtered.length>1?'s':''} dans cette zone`
        : `Aucun point référencé ici pour le moment — déplace la carte ou zoome`;
    }
  }catch(e){
    if(e.name!=='AbortError'){
      const label=document.getElementById('pointsCountLabel');
      if(label) label.innerHTML='Recherche indisponible — réessaie en déplaçant la carte';
    }
  }finally{
    if(loadingEl) loadingEl.style.display='none';
  }
}

function buildOrderSummaryText(deliveryLine){
  const lines = CART.map(item=>{
    const p=PRODUCTS.find(x=>x.id===item.productId);
    if(!p) return null;
    const pr=p.prices[item.priceIdx]||{};
    const lineTotal = pr.price ? (parseFloat(pr.price)*item.qty).toFixed(2) : '0.00';
    return `• ${p.name} x${item.qty} — ${lineTotal}€`;
  }).filter(Boolean);
  return [
    `🛍️ Nouvelle commande — `,
    ...lines,
    ``,
    `Total: ${cartTotal().toFixed(2)}€`,
    deliveryLine,
    `Client: ${VISITOR_NAME}`,
  ].join('\n');
}

async function finalizeOrder(deliveryLine){
  const summary = buildOrderSummaryText(deliveryLine);
  try{
    await navigator.clipboard.writeText(summary);
    toast('Commande copiée — colle-la dans Snapchat !');
  }catch(e){
    toast('Ouverture de Snapchat — copie le récap manuellement si besoin');

  checkoutStep=null;
  renderCheckoutSheetOverlay();
  const username = SETTINGS.snapchatUsername || 'soucoupe62';
  window.open(`https://www.snapchat.com/add/${username}`, '_blank');
}

let LIKE_COUNTS = {}; // productId -> count
let MY_LIKES = new Set(); // productIds this visitor liked
async function loadLikes(){
  try{
    const {data, error} = await sb.from('miniapp_product_likes').select('product_id, visitor_id');
    if(error) throw error;
    LIKE_COUNTS = {};
    MY_LIKES = new Set();
    (data||[]).forEach(row=>{
      LIKE_COUNTS[row.product_id] = (LIKE_COUNTS[row.product_id]||0)+1;
      if(row.visitor_id===VISITOR_ID) MY_LIKES.add(row.product_id);
    });
  }catch(e){ logSbError('loadLikes', e); }
}
async function toggleLike(productId){
  const wasLiked = MY_LIKES.has(productId);
  // optimistic update so the tap feels instant
  if(wasLiked){ MY_LIKES.delete(productId); LIKE_COUNTS[productId]=Math.max(0,(LIKE_COUNTS[productId]||1)-1); }
  else{ MY_LIKES.add(productId); LIKE_COUNTS[productId]=(LIKE_COUNTS[productId]||0)+1; }
  go(currentView);
  try{
    if(wasLiked){
      const {error} = await sb.from('miniapp_product_likes').delete().eq('product_id', productId).eq('visitor_id', VISITOR_ID);
      if(error) throw error;
    }else{
      const {error} = await sb.from('miniapp_product_likes').insert({product_id: productId, visitor_id: VISITOR_ID});
      if(error) throw error;
    }
  }catch(e){
    // roll back on failure
    if(wasLiked){ MY_LIKES.add(productId); LIKE_COUNTS[productId]=(LIKE_COUNTS[productId]||0)+1; }
    else{ MY_LIKES.delete(productId); LIKE_COUNTS[productId]=Math.max(0,(LIKE_COUNTS[productId]||1)-1); }
    go(currentView);
    toast('Échec — réessaie');
  }
}
function likeButtonHtml(productId, size){
  size = size||'small';
  const liked = MY_LIKES.has(productId);
  const count = LIKE_COUNTS[productId]||0;
  const fontSize = size==='large'?'14px':'11px';
  const iconSize = size==='large'?'18px':'14px';
  return `<button onclick="event.stopPropagation(); toggleLike('${productId}')" style="display:flex; align-items:center; gap:5px; background:${liked?'rgba(255,45,85,0.15)':'rgba(255,255,255,0.06)'}; border:1px solid ${liked?'#ff2d55':'var(--border-soft)'}; color:${liked?'#ff2d55':'#fff'}; padding:5px 10px; border-radius:20px; font-size:${fontSize}; font-weight:700;">
    <span style="font-size:${iconSize};">${liked?'❤️':'🤍'}</span>${count}
  </button>`;
}

let REVIEWS = [];
async function loadReviews(){
  try{
    const {data, error} = await sb.from('miniapp_reviews').select('*').eq('approved', true).order('created_at', {ascending:false});
    if(error) throw error;
    REVIEWS = data||[];
  }catch(e){ console.error('loadReviews failed', e); REVIEWS=[]; }
}
function reviewStats(){
  const total = REVIEWS.length;
  const counts = {5:0,4:0,3:0,2:0,1:0};
  let sum=0;
  REVIEWS.forEach(r=>{ counts[r.rating]=(counts[r.rating]||0)+1; sum+=r.rating; });
  const avg = total ? (sum/total) : 0;
  return {total, counts, avg};
}
let reviewFormOpen=false;
let reviewDraftRating=5;
function openReviewForm(){ reviewFormOpen=true; go('avis'); }
function closeReviewForm(){ reviewFormOpen=false; go('avis'); }
function setReviewDraftRating(n){ reviewDraftRating=n; go('avis'); }
function anonymousLabel(visitorId){
  // FNV-1a hash: solid avalanche behavior, avoids the collisions a naive multiplicative hash gets on similar-looking ids
  let hash = 0x811c9dc5;
  for(let i=0;i<visitorId.length;i++){
    hash ^= visitorId.charCodeAt(i);
    hash = Math.imul(hash, 0x01000193);
  }
  const code = (hash>>>0).toString(16).toUpperCase().padStart(8,'0').slice(0,5);
  return 'Client #'+code;
}
async function submitReview(){
  const comment = document.getElementById('reviewComment').value.trim();
  const btn = document.getElementById('reviewSubmitBtn');
  if(btn) btn.textContent='Envoi...';
  try{
    const {error} = await sb.from('miniapp_reviews').insert({
      visitor_id: VISITOR_ID, author_name: anonymousLabel(VISITOR_ID), rating: reviewDraftRating, comment,
    });
    if(error) throw error;
    await loadReviews();
    reviewFormOpen=false;
    toast('Avis publié — merci !');
    go('avis');
  }catch(e){
    toast('Échec de l\u2019envoi — réessaie');
    if(btn) btn.textContent='Publier mon avis';
  }
}
function timeAgo(dateStr){
  const d=new Date(dateStr), diff=(Date.now()-d.getTime())/1000;
  if(diff<60) return 'à l\u2019instant';
  if(diff<3600) return Math.floor(diff/60)+' min';
  if(diff<86400) return Math.floor(diff/3600)+' h';
  if(diff<2592000) return Math.floor(diff/86400)+' j';
  return d.toLocaleDateString('fr-FR');
}

let productDraft = null;
function newProductDraft(){
  return {id:null, name:'', description:'', category:'', farm:'', promoEnabled:false, bestSeller:false, mostProfitable:false,
    prices:[{qty:'',price:'',priceRdv:'',priceLivraison:''}], media:[]};
}
function ensureDraft(){ if(!productDraft) productDraft = newProductDraft(); }

function draftField(field, value){
  ensureDraft();
  productDraft[field]=value;
}
function draftPriceField(idx, field, value){
  ensureDraft();
  productDraft.prices[idx][field]=value;
}
function addPriceTier(){
  ensureDraft();
  productDraft.prices.push({qty:'',price:'',priceRdv:'',priceLivraison:''});
  go('admin');
}
function removePriceTier(idx){
  ensureDraft();
  if(productDraft.prices.length<=1){ toast('Il faut au moins un palier de prix'); return; }
  productDraft.prices.splice(idx,1);
  go('admin');
}
function compressImageToBlob(file, maxDim, quality){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>resolve(blob||file), 'image/jpeg', quality);
      };
      img.onerror=()=>resolve(file);
      img.src=reader.result;
    };
    reader.onerror=()=>resolve(file);
    reader.readAsDataURL(file);
  });
}
function mediaSrc(m){ return m.url || m.dataUrl; }
async function handleProductMedia(input){
  ensureDraft();
  const files=Array.from(input.files||[]);
  if(!files.length) return;
  for(const file of files){
    const isVideo = file.type.startsWith('video/');
    if(isVideo && file.size > 20*1024*1024){
      toast('Video trop lourde (>20 Mo)');
      continue;
    }
    try{
      const blob = isVideo ? file : await compressImageToBlob(file, 1000, 0.72);
      const ext = (isVideo ? (file.name.split('.').pop()||'mp4') : 'jpg').toLowerCase();
      const path = `${VISITOR_ID}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error} = await sb.storage.from('product-media').upload(path, blob, {contentType: blob.type || file.type});
      if(error) throw error;
      const {data} = sb.storage.from('product-media').getPublicUrl(path);
      productDraft.media.push({type:isVideo?'video':'image', url:data.publicUrl, path, name:file.name});
      go('admin');
    }catch(e){
      logSbError('uploadMedia', e);
      toast('Echec de l’envoi du media');
    }
  }
}
async function removeDraftMedia(idx){
  ensureDraft();
  const removed = productDraft.media.splice(idx,1)[0];
  go('admin');
  if(removed && removed.path){
    try{ await sb.storage.from('product-media').remove([removed.path]); }catch(e){}
  }
}
async function saveProduct(){
  ensureDraft();
  if(!productDraft.name || !productDraft.name.trim()){ toast('Le nom du produit est requis'); return; }
  const validPrices = productDraft.prices.filter(p=>p.qty || p.price);
  if(!validPrices.length){ toast('Ajoutez au moins un prix'); return; }
  const product = Object.assign({}, productDraft, {
    id: productDraft.id || ('p'+Date.now()),
    prices: validPrices,
  });
  toast('Enregistrement...');
  const ok = await upsertProductRemote(product);
  if(!ok){ showStorageFullError(); return; }
  const existingIdx = PRODUCTS.findIndex(p=>p.id===product.id);
  if(existingIdx>-1) PRODUCTS[existingIdx]=product; else PRODUCTS.push(product);
  toast(existingIdx>-1 ? 'Produit mis à jour' : 'Produit créé — visible par tous');
  productDraft = null;
  adminSub='produits';
  go('admin');
}
function showStorageFullError(){
  let el=document.getElementById('storageErr');
  if(!el){
    el=document.createElement('div');
    el.id='storageErr';
    el.className='lock-screen';
    el.style.background='rgba(0,0,0,0.9)';
    el.innerHTML=`
      <div class="icon-circle" style="width:60px;height:60px; color:var(--danger); border-color:var(--danger);">${ic('close')}</div>
      <div style="font-size:16px; font-weight:800;">Échec de l'enregistrement</div>
      <div style="font-size:13px; color:var(--text-dim); max-width:280px; line-height:1.5;">La sauvegarde en ligne a échoué (connexion ou fichier trop lourd). Vérifie ta connexion, allège les médias, puis réessaie.</div>
      <button class="btn-primary" style="max-width:220px;" onclick="document.getElementById('storageErr').remove()">Compris</button>
    `;
    document.getElementById('app').appendChild(el);
  }
}
function editProduct(id){
  const p = PRODUCTS.find(p=>p.id===id);
  if(!p) return;
  productDraft = JSON.parse(JSON.stringify(p));
  adminSub='creer';
  go('admin');
}
async function deleteProduct(id){
  const backup = PRODUCTS.slice();
  PRODUCTS = PRODUCTS.filter(p=>p.id!==id);
  go('admin');
  const ok = await deleteProductRemote(id);
  if(!ok){ PRODUCTS = backup; toast('Échec de la suppression'); go('admin'); return; }
  toast('Produit supprimé');
}

async function addCategory(){
  const input=document.getElementById('inpNewCat');
  const name=input.value.trim();
  if(!name){ toast('Entre un nom de catégorie'); return; }
  if((SETTINGS.categories||[]).some(c=>c.toLowerCase()===name.toLowerCase())){ toast('Cette catégorie existe déjà'); return; }
  SETTINGS.categories = [...(SETTINGS.categories||[]), name];
  categoryFormOpen=false;
  const ok = await persistSettings();
  if(!ok){ showStorageFullError(); return; }
  toast('Catégorie créée');
  go('admin');
}
async function removeCategory(name){
  SETTINGS.categories = (SETTINGS.categories||[]).filter(c=>c!==name);
  const ok = await persistSettings();
  if(!ok){ showStorageFullError(); return; }
  toast('Catégorie supprimée');
  go('admin');
}

function estimateAccountAge(telegramId){
  // Telegram IDs roughly increase over time across all users — NOT an official/precise
  // field, just a very rough ballpark so the admin isn't flying totally blind.
  const id = parseInt(telegramId, 10);
  if(!id) return null;
  const brackets = [
    [10000000, 'très ancien compte (~2013-2015)'],
    [200000000, 'ancien compte (~2016-2018)'],
    [1000000000, 'compte moyen (~2019-2021)'],
    [6000000000, 'compte plus récent (~2022-2024)'],
  ];
  for(const [max, label] of brackets){ if(id < max) return label; }
  return 'compte très récent (2025+)';
}

let adminOpenConvo = null;
let ALL_CHAT = [];
async function loadAllChat(){
  try{
    const {data, error} = await sb.from('miniapp_chat_messages').select('*').order('created_at', {ascending:true});
    if(error) throw error;
    ALL_CHAT = data||[];

function chatConversations(){
  const map={};
  ALL_CHAT.forEach(m=>{
    if(!map[m.visitor_id]) map[m.visitor_id]={visitor_id:m.visitor_id, visitor_name:m.visitor_name, messages:[]};
    map[m.visitor_id].messages.push(m);
  });
  return Object.values(map).sort((a,b)=> new Date(b.messages.at(-1).created_at) - new Date(a.messages.at(-1).created_at));
}

async function sendAdminReply(){
  const input=document.getElementById('adminReplyInput');
  const text=input.value.trim();
  if(!text || !adminOpenConvo) return;
  input.value='';
  const convo = chatConversations().find(c=>c.visitor_id===adminOpenConvo);

function handleBgUpload(input){
  const file=input.files && input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async ()=>{
    const compressed = await compressImage(reader.result, 1200, 0.75);
    const backup = SETTINGS.bgImage;
    SETTINGS.bgImage = compressed;
    applySettings();
    const ok = await persistSettings();
    if(!ok){ SETTINGS.bgImage=backup; applySettings(); showStorageFullError(); return; }
    toast('Fond applique — visible par tous');
    go(currentView);
  };
  reader.readAsDataURL(file);
}
function handleMusicUpload(input){
  const file=input.files && input.files[0];
  if(!file) return;
  if(file.size > 4*1024*1024){ toast('Fichier > 4 Mo — risque fort de faire échouer l\u2019enregistrement'); }
  const reader=new FileReader();
  reader.onload=async ()=>{
    const backup = SETTINGS.musicTracks.slice();
    SETTINGS.musicTracks.push({id:'t'+Date.now(), name:file.name, data:reader.result});
    const ok = await persistSettings();
    if(!ok){ SETTINGS.musicTracks = backup; showStorageFullError(); return; }
    toast('Piste ajoutée'); go('admin');
    refreshMusicPlayer();
  };
  reader.readAsDataURL(file);
}
async function removeTrack(i){
  const backup = SETTINGS.musicTracks.slice();
  SETTINGS.musicTracks.splice(i,1);
  go('admin');
  const ok = await persistSettings();
  if(!ok){ SETTINGS.musicTracks = backup; toast('Échec de la suppression'); go('admin'); return; }
  toast('Piste supprimée');
  refreshMusicPlayer();
}
function previewTrack(i){
  const tr=SETTINGS.musicTracks[i];
  if(!tr) return;
  let p=document.getElementById('trackPreview');
  if(!p){ p=document.createElement('audio'); p.id='trackPreview'; document.body.appendChild(p); }
  p.src=tr.data; p.currentTime=0; p.play().catch(()=>{});
}

let currentView='home';
const VIEW_RENDERERS={
  home:viewHome, infos:viewInfos, carte:viewCarte, panier:viewPanier,

  admin:()=>viewAdmin(),

function go(id){
  const hideable={infos:'navInfos', carte:'navCarte', avis:'navAvis', chat:'navSupport'};
  if(hideable[id] && !SETTINGS[hideable[id]]) id='home';
  if(id==='admin' && !IS_ADMIN) id='home';
  const isFreshChatEntry = (id==='chat' && currentView!=='chat');
  const isFreshCarteEntry = (id==='carte' && currentView!=='carte');
  const isFreshLikesView = ((id==='home' || id.startsWith('product_')) && currentView!==id);
  currentView=id;
  const container=document.getElementById('views');
  let renderer=VIEW_RENDERERS[id];
  if(!renderer && id.startsWith('product_')){
    const pid=id.slice(8);
    renderer=()=>viewProductDetail(pid);
  }
  container.innerHTML = `<div class="view active">${renderer ? renderer() : '<p style=\"padding:40px;text-align:center;color:#888\">Bientôt disponible</p>'}</div>`;
  renderNav();
  const scroller=container.querySelector('.view');
  if(id==='chat' && scroller){ scroller.scrollTop = scroller.scrollHeight; }
  else{ container.scrollTop=0; if(scroller) scroller.scrollTop=0; }
  startParticles();
  if(isFreshChatEntry){ loadMyChat().then(()=>{ if(currentView==='chat') go('chat'); }); }
  if(isFreshCarteEntry){ setTimeout(initLeafletMap, 30); }
  if(isFreshLikesView && SETTINGS.productLikes){ loadLikes().then(()=>{ if(currentView===id) go(id); }); }
}

/* ---------------- TELEGRAM MINI APP INTEGRATION ----------------
   Outside Telegram (plain browser on PC or phone) none of this runs and the CSS
   dvh/vh fallback above takes over — that's why it always looked fine there.
   Inside Telegram's own in-app browser, the WebApp SDK is the only reliable way
   to get the real usable height and to stop Telegram's own gestures from
   interfering with our scrolling / bottom nav. */
function applyTgHeight(){
  const wa = window.Telegram && window.Telegram.WebApp;
  if(!wa) return;
  const h = wa.viewportStableHeight || wa.viewportHeight;
  if(h) document.documentElement.style.setProperty('--tg-viewport-stable-height', h+'px');
}
(function initTelegram(){
  const wa = window.Telegram && window.Telegram.WebApp;
  if(!wa){ return; } // not running inside Telegram — nothing to do, CSS fallback handles it
  try{
    wa.ready();
    wa.expand(); // request full available height instead of the collapsed half-screen state
    if(typeof wa.disableVerticalSwipes === 'function') wa.disableVerticalSwipes(); // stop Telegram's swipe-to-close from eating our scroll
    if(typeof wa.setHeaderColor === 'function') wa.setHeaderColor('#0a0a0a');
    if(typeof wa.setBackgroundColor === 'function') wa.setBackgroundColor('#0a0a0a');
    if(typeof wa.setBottomBarColor === 'function') wa.setBottomBarColor('#0a0a0a');
    applyTgHeight();
    wa.onEvent('viewportChanged', applyTgHeight);
    window.addEventListener('resize', applyTgHeight);
  }catch(e){ /* older Telegram client missing some methods — safe to ignore, CSS fallback still applies */ }
})();

function isUnlocked(){
  try{
    const until = parseInt(localStorage.getItem('soucoupe62_unlock_until')||'0', 10);
    return Date.now() < until;
  }catch(e){ return false; }
}
function setUnlocked(){
  try{ localStorage.setItem('soucoupe62_unlock_until', String(Date.now() + 12*60*60*1000)); }catch(e){}
}
function showLockScreen(){
  const app=document.getElementById('app');
  const el=document.createElement('div');
  el.className='lock-screen';
  el.id='lockScreen';
  el.innerHTML=`
    <div class="icon-circle" style="width:64px;height:64px;">${ic('shield')}</div>
    <div style="font-size:18px; font-weight:800;">Application verrouillée</div>
    <div style="font-size:13px; color:var(--text-dim); max-width:260px;">Entrez le mot de passe défini par la boutique pour continuer.</div>
    <input type="password" id="lockInput" placeholder="••••" inputmode="numeric" autofocus>
    <div class="err" id="lockErr"></div>
    <button class="btn-primary" style="max-width:260px;" onclick="tryUnlock()">Déverrouiller</button>
  `;
  app.appendChild(el);
  const input=document.getElementById('lockInput');
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  setTimeout(()=>input.focus(), 200);
}
function tryUnlock(){
  const val=document.getElementById('lockInput').value;
  if(val === SETTINGS.securePassword){
    setUnlocked();
    document.getElementById('lockScreen').remove();
  }else{
    document.getElementById('lockErr').textContent='Mot de passe incorrect.';
  }
}

/* ---------------- OPENING INTRO ANIMATION ---------------- */
function playIntroAnimation(){
  if(!SETTINGS.openAnimEnabled || SETTINGS.openAnim==='none') return;
  const app=document.getElementById('app');
  const el=document.createElement('div');
  el.className='intro-overlay intro-'+SETTINGS.openAnim;
  if(SETTINGS.openAnim==='soucoupe'){
    const dots='<span></span>'.repeat(8);
    const brand=(SETTINGS.brand||'').toUpperCase();
    el.innerHTML=`
      <canvas class="intro-fx"></canvas>
      <div class="intro-saucer-stage">
        <div class="intro-saucer">
          <div class="intro-hull-lower"></div>
          <div class="intro-light-ring">${dots}</div>
          <div class="intro-hull-upper"></div>
          <div class="intro-dome"></div>
        </div>
      </div>
      <div class="intro-bottom-block">
        <h1 class="intro-wordmark">${brand}</h1>
        <p class="intro-tagline">Ouverture de la boutique…</p>
        <div class="intro-loader-dots"><span></span><span></span><span></span></div>
      </div>`;
    app.appendChild(el);
    playSoucoupeFx(el);
    setTimeout(()=>el.remove(), 3200);
    return;
  }
  el.innerHTML='<div class="ring"></div>';
  app.appendChild(el);
  setTimeout(()=>el.remove(), 2000);
}
function playSoucoupeFx(el){
  const canvas=el.querySelector('canvas.intro-fx');
  const ctx=canvas.getContext('2d');
  const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  const W=el.clientWidth, H=el.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const stars=Array.from({length:Math.round((W*H)/2600)}, ()=>({
    x:Math.random()*W, y:Math.random()*H*0.62,
    r:Math.random()*1.3+.3, phase:Math.random()*Math.PI*2, speed:Math.random()*.6+.3,
  }));
  const beamStart=performance.now()+1350;
  let stop=false;
  setTimeout(()=>{ stop=true; }, 3200);
  function draw(t){
    if(stop) return;
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const tw=reduced ? .8 : (Math.sin(t*0.001*s.speed+s.phase)*0.4+0.6);
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(217,245,224,${tw*0.85})`;
      ctx.fill();
    });
    const originX=W*0.5, originY=H*0.30+16;
    const elapsed=t-beamStart;
    if(elapsed>0){
      const p=reduced ? 1 : Math.min(1, elapsed/1400);
      const ease=1-Math.pow(1-p,3);
      const pulse=reduced ? 1 : (0.85+Math.sin(t*0.0022)*0.15);
      const beamLen=(H*0.4)*ease;
      const topW=22, botW=104*ease;
      const grad=ctx.createLinearGradient(0,originY,0,originY+beamLen);
      grad.addColorStop(0, `rgba(166,255,192,${0.38*ease*pulse})`);
      grad.addColorStop(1, `rgba(57,255,20,0)`);
      ctx.beginPath();
      ctx.moveTo(originX-topW/2, originY);
      ctx.lineTo(originX+topW/2, originY);
      ctx.lineTo(originX+botW/2, originY+beamLen);
      ctx.lineTo(originX-botW/2, originY+beamLen);
      ctx.closePath();
      ctx.fillStyle=grad;
      ctx.fill();
    }
    if(!reduced) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
  if(reduced) setTimeout(()=>draw(performance.now()), 1500);
}

/* ---------------- BOOT ---------------- */
/* ---------------- BACKGROUND MUSIC (auto-plays for every visitor) ---------------- */
let bgAudio=null;
function refreshMusicPlayer(){
  const shouldPlay = SETTINGS.musicEnabled && SETTINGS.musicTracks.length>0;
  if(!shouldPlay){
    if(bgAudio){ bgAudio.pause(); bgAudio=null; }
    return;
  }
  if(!bgAudio){
    bgAudio=document.createElement('audio');
    bgAudio.id='bgAudio';
    bgAudio.loop = SETTINGS.musicTracks.length===1;
    bgAudio.style.display='none';
    document.body.appendChild(bgAudio);
    let idx=0;
    const playIdx=(i)=>{
      if(!SETTINGS.musicTracks.length) return;
      idx = i % SETTINGS.musicTracks.length;
      bgAudio.src = SETTINGS.musicTracks[idx].data;
      bgAudio.play().catch(()=>{});
    };
    bgAudio.addEventListener('ended', ()=>{ if(SETTINGS.musicTracks.length>1) playIdx(idx+1); });
    playIdx(0);
    // Browsers block autoplay with sound until the visitor interacts with the page at least once.
    // Start muted so playback actually begins, then unmute on the very first tap/click.
    bgAudio.muted = true;
    bgAudio.play().catch(()=>{});
    const unmuteOnce=()=>{
      bgAudio.muted=false;
      bgAudio.play().catch(()=>{});
      document.removeEventListener('click', unmuteOnce);
      document.removeEventListener('touchstart', unmuteOnce);
    };
    document.addEventListener('click', unmuteOnce, {once:true});
    document.addEventListener('touchstart', unmuteOnce, {once:true});
  }
}

function showBootLoader(){
  const app=document.getElementById('app');
  const el=document.createElement('div');
  el.id='bootLoader';
  el.className='lock-screen';
  el.style.zIndex='9998';
  el.innerHTML=`<div class="icon-circle" style="width:56px;height:56px; animation:introSpin 1s linear infinite;">${ic('refresh')}</div><div style="font-size:13px; color:var(--text-dim);">Chargement...</div>`;
  app.appendChild(el);
}
function showConnectionIssueBanner(){
  const app=document.getElementById('app');
  let el=document.getElementById('connErr');
  if(el) return;
  el=document.createElement('div');
  el.id='connErr';
  el.style.cssText='position:absolute; top:10px; left:10px; right:10px; z-index:3000; background:#3a1010; border:1px solid var(--danger); color:#ffb0b0; font-size:12px; font-weight:600; padding:10px 14px; border-radius:12px; display:flex; align-items:center; justify-content:space-between; gap:10px;';
  el.innerHTML = `<span>Connexion au serveur impossible — données peut-être obsolètes.</span>
    <button onclick="location.reload()" style="background:var(--danger); color:#fff; border:none; padding:6px 10px; border-radius:8px; font-weight:700; flex-shrink:0;">Recharger</button>`;
  app.appendChild(el);
}
// ---------- Synchronisation en direct (Supabase Realtime) ----------
// Dès que l'admin modifie un produit ou un réglage, tous les visiteurs déjà
// ouverts sur la mini-app reçoivent la mise à jour sans avoir besoin de recharger.
function setupRealtimeSync(){
  sb.channel('miniapp-live-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'miniapp_products'}, async ()=>{
      await loadProducts();
      if(currentView!=='admin') go(currentView);
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'miniapp_settings'}, async ()=>{
      await loadSettings();
      applySettings();
      if(currentView!=='admin'){ go(currentView); renderNav(); }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'miniapp_visitors'}, async ()=>{
      // Nouvelle demande d'accès, ou statut changé — utile pour l'admin (panneau Vérifications)
      // et pour un visiteur en attente qui vient d'être accepté/refusé (mise à jour instantanée).
      if(IS_ADMIN){
        await loadVisitors();
        if(adminSub==='verifications') go('admin');
      } else if(MY_VISITOR_STATUS==='pending'){
        const tgUser = getTgUser();
        if(tgUser){
          try{
            const {data} = await sb.from('miniapp_visitors').select('status').eq('telegram_id', String(tgUser.id)).single();
            if(data && data.status!==MY_VISITOR_STATUS){
              MY_VISITOR_STATUS = data.status;
              renderVerificationGateIfNeeded();
              if(MY_VISITOR_STATUS==='approved') go('home');
            }
          }catch(e){}
        }
      }
    })
    .subscribe();
}

async function boot(){
  showBootLoader();
  loadCart();
  await Promise.all([loadSettings(), loadProducts(), loadReviews(), registerAndCheckVisitor(), loadLikes()]);
  applySettings();
  const loader=document.getElementById('bootLoader');
  if(loader) loader.remove();
  if(lastSettingsLoadFailed){ showConnectionIssueBanner(); }
  if(SETTINGS.secureMode && SETTINGS.securePassword && !isUnlocked()){
    showLockScreen();
  }
  playIntroAnimation();
  refreshMusicPlayer();
  go('home');
  renderVerificationGateIfNeeded();
  if(MY_VISITOR_STATUS==='pending') startVisitorStatusPolling();
  if(IS_ADMIN){ loadVisitors().then(()=>{ if(currentView==='admin') go('admin'); }); }
  setupRealtimeSync();
}
boot();
